services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "6130:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VAULT_PATH=/vault
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/vault:rw
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:6130}
    ports:
      - "6120:5173"
    depends_on:
      - backend
    restart: unless-stopped
